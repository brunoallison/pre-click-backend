name: Deploy to Cloud Run

# Prod: inerte até houver push em `main`.
# Dev: deploy automático a cada push em `development`.
on:
  push:
    branches:
      - development
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: pre-click
  PROJECT_PREFIX: pre-click-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev

      - name: Create Artifact Registry repository if not exists
        run: |
          gcloud artifacts repositories describe ${{ env.PROJECT_PREFIX }} \
            --location=${{ vars.REGION }} \
            --project=${{ vars.PROJECT_ID }} \
            2>/dev/null || gcloud artifacts repositories create ${{ env.PROJECT_PREFIX }} \
            --repository-format=docker \
            --location=${{ vars.REGION }} \
            --project=${{ vars.PROJECT_ID }}

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.PROJECT_PREFIX }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.PROJECT_PREFIX }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Run database migrations via Cloud Run Job
        run: |
          IMAGE="${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.PROJECT_PREFIX }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          gcloud run jobs deploy ${{ env.SERVICE_NAME }}-migration \
            --region ${{ vars.REGION }} \
            --project ${{ vars.PROJECT_ID }} \
            --max-retries 1 \
            --task-timeout 600 \
            --tasks 1 \
            --add-volume=name=dd-logs,type=in-memory,size-limit=256Mi \
            --add-volume=name=dd-run,type=in-memory,size-limit=128Mi \
            \
            --container ${{ env.SERVICE_NAME }}-migration \
            --image "${IMAGE}" \
            --memory 1Gi \
            --cpu 1 \
            --depends-on datadog-agent \
            --command /bin/sh \
            --args "-c,status=0; npm run migration:run || status=\$?; sleep 30; exit \$status" \
            --set-env-vars "\
              POSTGRES_HOST=127.0.0.1,\
              POSTGRES_PORT=${{ secrets.POSTGRES_PORT }},\
              POSTGRES_DATABASE=${{ secrets.POSTGRES_DATABASE }},\
              POSTGRES_USERNAME=${{ secrets.POSTGRES_USERNAME }},\
              POSTGRES_SCHEMA=${{ secrets.POSTGRES_SCHEMA }},\
              CLOUD_SQL_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }},\
              NODE_ENV=${{ vars.NODE_ENV }},\
              LOG_LEVEL=${{ vars.LOG_LEVEL }},\
              LOG_FILE=/var/lib/datadog-agent/logs/migration.log,\
              NODE_OPTIONS=--require dd-trace/init,\
              DD_AGENT_HOST=localhost,\
              DD_TRACE_AGENT_URL=unix:///opt/datadog-agent/run/apm.socket,\
              DD_LOGS_INJECTION=true,\
              DD_ENV=${{ vars.NODE_ENV }},\
              DD_VERSION=${{ github.sha }},\
              DD_SERVICE=${{ env.SERVICE_NAME }}-migration" \
            --set-secrets "POSTGRES_PASSWORD=POSTGRES_PASSWORD:latest" \
            --add-volume-mount=volume=dd-logs,mount-path=/var/lib/datadog-agent/logs \
            --add-volume-mount=volume=dd-run,mount-path=/opt/datadog-agent/run \
            \
            --container datadog-agent \
            --image gcr.io/datadoghq/serverless-init:latest \
            --memory 512Mi \
            --cpu 0.5 \
            --set-env-vars "\
              DD_API_KEY=${{ secrets.DD_API_KEY }},\
              DD_SITE=${{ vars.DD_SITE }},\
              DD_SERVICE=${{ env.SERVICE_NAME }},\
              DD_VERSION=${{ github.sha }},\
              DD_SOURCE=nodejs,\
              DD_SERVERLESS_LOG_PATH=/var/lib/datadog-agent/logs/*.log,\
              DD_APM_RECEIVER_SOCKET=/opt/datadog-agent/run/apm.socket,\
              DD_HEALTH_PORT=12345,\
              DD_ENV=${{ vars.NODE_ENV }},\
              DD_LOG_LEVEL=warn,\
              DD_LOGS_ENABLED=true,\
              DD_LOGS_CONFIG_DISK_QUEUE_ENABLED=true,\
              DD_LOGS_CONFIG_DISK_QUEUE_PATH=/var/lib/datadog-agent/logs,\
              DD_LOGS_CONFIG_DISK_QUEUE_MAX_SIZE=256MB,\
              DD_APM_ENABLED=true,\
              DD_APM_NON_LOCAL_TRAFFIC=true,\
              DD_CONTAINER_EXCLUDE_LOGS=name:datadog-agent,\
              DD_CONTAINER_INCLUDE_LOGS=name:${{ env.SERVICE_NAME }}-migration,\
              DD_PROCESS_AGENT_ENABLED=false,\
              DD_ORCHESTRATOR_EXPLORER_ENABLED=false,\
              DD_WORKLOADMETA_REMOTE_TIMEOUT_SECONDS=2" \
            --add-volume-mount=volume=dd-logs,mount-path=/var/lib/datadog-agent/logs \
            --add-volume-mount=volume=dd-run,mount-path=/opt/datadog-agent/run \
            --startup-probe=tcpSocket.port=12345,periodSeconds=10,failureThreshold=6,timeoutSeconds=1 \
            \
            --container cloud-sql-proxy \
            --image gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest \
            --memory 256Mi \
            --cpu 0.25 \
            --args "${{ secrets.CLOUD_SQL_CONNECTION_NAME }}?port=5432"

          gcloud run jobs execute ${{ env.SERVICE_NAME }}-migration \
            --region ${{ vars.REGION }} \
            --project ${{ vars.PROJECT_ID }} \
            --wait

      - name: Deploy pre-click
        run: |
          IMAGE="${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.PROJECT_PREFIX }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud run services replace /dev/stdin \
            --region ${{ vars.REGION }} \
            --project ${{ vars.PROJECT_ID }} <<EOF
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: ${{ env.SERVICE_NAME }}
            annotations:
              run.googleapis.com/ingress: all
          spec:
            template:
              metadata:
                annotations:
                  autoscaling.knative.dev/minScale: "0"
                  autoscaling.knative.dev/maxScale: "5"
                  run.googleapis.com/cpu-throttling: "false"
                  run.googleapis.com/container-dependencies: '{"${{ env.SERVICE_NAME }}":["datadog-agent","cloud-sql-proxy"]}'
              spec:
                timeoutSeconds: 300
                containerConcurrency: 80
                containers:
                - name: ${{ env.SERVICE_NAME }}
                  image: ${IMAGE}
                  ports:
                  - name: http1
                    containerPort: 8080
                  volumeMounts:
                  - name: dd-logs
                    mountPath: /var/lib/datadog-agent/logs
                  - name: dd-run
                    mountPath: /opt/datadog-agent/run
                  env:
                  - name: NODE_ENV
                    value: "${{ vars.NODE_ENV }}"
                  - name: LOG_LEVEL
                    value: "${{ vars.LOG_LEVEL }}"
                  - name: LOG_FILE
                    value: "/var/lib/datadog-agent/logs/app.log"
                  - name: POSTGRES_HOST
                    value: "127.0.0.1"
                  - name: POSTGRES_PORT
                    value: "${{ secrets.POSTGRES_PORT }}"
                  - name: POSTGRES_DATABASE
                    value: "${{ secrets.POSTGRES_DATABASE }}"
                  - name: POSTGRES_USERNAME
                    value: "${{ secrets.POSTGRES_USERNAME }}"
                  - name: POSTGRES_SCHEMA
                    value: "${{ secrets.POSTGRES_SCHEMA }}"
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        key: latest
                        name: POSTGRES_PASSWORD
                  - name: CLOUD_SQL_CONNECTION_NAME
                    value: "${{ secrets.CLOUD_SQL_CONNECTION_NAME }}"
                  - name: REDIS_HOST
                    value: "${{ secrets.REDIS_HOST }}"
                  - name: REDIS_PORT
                    value: "${{ secrets.REDIS_PORT }}"
                  - name: REDIS_TLS
                    value: "${{ secrets.REDIS_TLS }}"
                  - name: REDIS_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        key: latest
                        name: REDIS_PASSWORD
                  - name: JWT_SECRET
                    valueFrom:
                      secretKeyRef:
                        key: latest
                        name: JWT_SECRET
                  - name: GCS_BUCKET_NAME
                    value: "${{ secrets.GCS_BUCKET_NAME }}"
                  - name: ANTHROPIC_API_KEY
                    valueFrom:
                      secretKeyRef:
                        key: latest
                        name: ANTHROPIC_API_KEY
                  - name: FRONTEND_URL
                    value: "${{ vars.FRONTEND_URL }}"
                  - name: CORS_ORIGIN
                    value: "${{ vars.FRONTEND_URL }}"
                  - name: NODE_OPTIONS
                    value: "--require dd-trace/init"
                  - name: DD_AGENT_HOST
                    value: "localhost"
                  - name: DD_TRACE_AGENT_URL
                    value: "unix:///opt/datadog-agent/run/apm.socket"
                  - name: DD_LOGS_INJECTION
                    value: "true"
                  - name: DD_ENV
                    value: "${{ vars.NODE_ENV }}"
                  - name: DD_VERSION
                    value: "${{ github.sha }}"
                  - name: DD_SERVICE
                    value: "${{ env.SERVICE_NAME }}"
                  - name: DD_SITE
                    value: "${{ vars.DD_SITE }}"
                  - name: DD_API_KEY
                    valueFrom:
                      secretKeyRef:
                        key: latest
                        name: DD_API_KEY
                  startupProbe:
                    tcpSocket:
                      port: 8080
                    periodSeconds: 5
                    failureThreshold: 20
                    timeoutSeconds: 1
                  resources:
                    limits:
                      cpu: "1000m"
                      memory: "1Gi"
                - name: datadog-agent
                  image: gcr.io/datadoghq/serverless-init:latest
                  volumeMounts:
                  - name: dd-logs
                    mountPath: /var/lib/datadog-agent/logs
                  - name: dd-run
                    mountPath: /opt/datadog-agent/run
                  env:
                  - name: DD_API_KEY
                    valueFrom:
                      secretKeyRef:
                        key: latest
                        name: DD_API_KEY
                  - name: DD_SITE
                    value: "${{ vars.DD_SITE }}"
                  - name: DD_SERVICE
                    value: "${{ env.SERVICE_NAME }}"
                  - name: DD_VERSION
                    value: "${{ github.sha }}"
                  - name: DD_SOURCE
                    value: "nodejs"
                  - name: DD_SERVERLESS_LOG_PATH
                    value: "/var/lib/datadog-agent/logs/*.log"
                  - name: DD_APM_RECEIVER_SOCKET
                    value: "/opt/datadog-agent/run/apm.socket"
                  - name: DD_HEALTH_PORT
                    value: "12345"
                  - name: DD_ENV
                    value: "${{ vars.NODE_ENV }}"
                  - name: DD_LOG_LEVEL
                    value: "warn"
                  - name: DD_LOGS_ENABLED
                    value: "true"
                  - name: DD_LOGS_CONFIG_DISK_QUEUE_ENABLED
                    value: "true"
                  - name: DD_LOGS_CONFIG_DISK_QUEUE_PATH
                    value: "/var/lib/datadog-agent/logs"
                  - name: DD_LOGS_CONFIG_DISK_QUEUE_MAX_SIZE
                    value: "256MB"
                  - name: DD_APM_ENABLED
                    value: "true"
                  - name: DD_APM_NON_LOCAL_TRAFFIC
                    value: "true"
                  - name: DD_CONTAINER_EXCLUDE_LOGS
                    value: "name:datadog-agent"
                  - name: DD_CONTAINER_INCLUDE_LOGS
                    value: "name:${{ env.SERVICE_NAME }}"
                  - name: DD_PROCESS_AGENT_ENABLED
                    value: "false"
                  - name: DD_ORCHESTRATOR_EXPLORER_ENABLED
                    value: "false"
                  - name: DD_WORKLOADMETA_REMOTE_TIMEOUT_SECONDS
                    value: "2"
                  startupProbe:
                    tcpSocket:
                      port: 12345
                    initialDelaySeconds: 0
                    periodSeconds: 10
                    timeoutSeconds: 1
                    failureThreshold: 3
                  resources:
                    limits:
                      cpu: "500m"
                      memory: "512Mi"
                - name: cloud-sql-proxy
                  image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
                  args:
                  - "${{ secrets.CLOUD_SQL_CONNECTION_NAME }}?port=5432"
                  startupProbe:
                    tcpSocket:
                      port: 5432
                    initialDelaySeconds: 2
                    periodSeconds: 5
                    timeoutSeconds: 3
                    failureThreshold: 12
                  resources:
                    limits:
                      cpu: "250m"
                      memory: "256Mi"
                volumes:
                - name: dd-logs
                  emptyDir:
                    sizeLimit: 256Mi
                - name: dd-run
                  emptyDir:
                    sizeLimit: 128Mi
          EOF

          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region ${{ vars.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project ${{ vars.PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ vars.REGION }} \
            --format="value(status.url)" \
            --project ${{ vars.PROJECT_ID }}
